<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <meta charset="UTF-8"> 
    <title>WayNorte</title> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" type="text/css" href="mapa.css"> 

    <!-- Firebase SDKs para cargar los trazados de las rutas -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head> 
<body> 
    <div id="login-screen"> 
        
        <div class="burbuja burbuja-1"></div> 
        <div class="burbuja burbuja-2"></div> 
        <div class="burbuja burbuja-3"></div> 
        <div class="burbuja burbuja-4"></div> 
        
        <div class="login-card"> 
            <h2>WayNorte</h2> 
            <p>Mapa Interactivo para la ubicacion de lugares Turisticos, Paraderos con horarios de micro y Puntos de acopio (Reciclaje)</p> 
            
            <div class="auth-container"> 
                <input type="email" id="auth-email" placeholder="Correo electrónico" class="input-field"> 
                <input type="password" id="auth-password" placeholder="Contraseña" class="input-field"> 
                
                <button onclick="iniciarSesion()" class="btn-login">Iniciar Sesión</button> 
                <button onclick="registrarUsuario()" class="btn-register">Crear Cuenta</button> 
            </div> 
        </div> 
    </div> 

    <div id="map"></div> 

    <button onclick="centrarEnUsuario()" class="btn-locate" title="Mi ubicación"> 
        🎯 
    </button> 
    
    <!-- NUEVO: Botón para el Modo Nocturno -->
    <button id="btn-darkMode" class="btn-dark" title="Modo Nocturno">
        🌙
    </button>

    <div class="legend" id="map-legend" style="display: none;"> 
        <h4>Marcadores</h4> 
        <div class="legend-item"><span class="circle tur"></span> Turismo</div> 
        <div class="legend-item"><span class="circle reci"></span> Reciclaje</div> 
        <div class="legend-item"><span class="circle para"></span> Paraderos</div> 
    </div> <!-- Cierra la caja de la leyenda. -->
    
    <!-- 1. PRIMERO: Leaflet (El mapa base) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
    
    <!-- 2. SEGUNDO: Plugin de Flechas (Desde un servidor más estable) -->
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

    <!-- 3. TERCERO: Tu código con la lógica (Siempre debe ir al final) -->
    <script src="mapa.js"></script> 
</body> 
</html>
